<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .component { fill: #add8e6; stroke: #333; stroke-width: 2; }
      .sensor { fill: #90ee90; stroke: #333; stroke-width: 2; }
      .power { fill: #f9f; stroke: #333; stroke-width: 2; }
      .logic { fill: #ffe4b5; stroke: #333; stroke-width: 2; }
      .wire { stroke: #333; stroke-width: 2; fill: none; }
      .wire-power { stroke: #e74c3c; stroke-width: 2; fill: none; }
      .wire-ground { stroke: #000; stroke-width: 3; fill: none; }
      .wire-i2c { stroke: #3498db; stroke-width: 2; fill: none; }
      .wire-signal { stroke: #27ae60; stroke-width: 2; fill: none; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .pin { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
      .resistor { fill: none; stroke: #333; stroke-width: 2; }
      .dot { fill: #e74c3c; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" class="title">ESP32 Water Quality Monitor - Circuit Schematic</text>
  
  <!-- Power Supply Section (Top Left) -->
  <rect x="50" y="60" width="120" height="60" class="power" rx="5"/>
  <text x="110" y="85" text-anchor="middle" class="label">5V Power</text>
  <text x="110" y="105" text-anchor="middle" class="label">Source</text>
  
  <!-- Ground Symbol -->
  <rect x="50" y="150" width="120" height="40" class="power" rx="5"/>
  <text x="110" y="175" text-anchor="middle" class="label">GND</text>
  
  <!-- ESP32 Module (Center) -->
  <rect x="350" y="250" width="180" height="280" class="component" rx="5"/>
  <text x="440" y="275" text-anchor="middle" class="title">ESP32-WROOM-32</text>
  
  <!-- ESP32 Pins -->
  <text x="360" y="310" class="pin">5V IN</text>
  <circle cx="355" cy="307" r="3" class="dot"/>
  
  <text x="360" y="330" class="pin">3.3V OUT</text>
  <circle cx="355" cy="327" r="3" class="dot"/>
  
  <text x="360" y="350" class="pin">GND</text>
  <circle cx="355" cy="347" r="3" class="dot"/>
  
  <text x="360" y="390" class="pin">GPIO 21 (SDA)</text>
  <circle cx="355" cy="387" r="3" class="dot"/>
  
  <text x="360" y="410" class="pin">GPIO 22 (SCL)</text>
  <circle cx="355" cy="407" r="3" class="dot"/>
  
  <text x="360" y="450" class="pin">GPIO 4</text>
  <circle cx="355" cy="447" r="3" class="dot"/>
  
  <!-- ADS1115 ADC (Right of ESP32) -->
  <rect x="700" y="300" width="150" height="200" class="logic" rx="5"/>
  <text x="775" y="325" text-anchor="middle" class="title">ADS1115</text>
  <text x="775" y="345" text-anchor="middle" class="label">16-bit ADC</text>
  
  <!-- ADS1115 Pins -->
  <text x="710" y="375" class="pin">VDD</text>
  <circle cx="705" cy="372" r="3" class="dot"/>
  
  <text x="710" y="395" class="pin">GND</text>
  <circle cx="705" cy="392" r="3" class="dot"/>
  
  <text x="710" y="415" class="pin">SDA</text>
  <circle cx="705" cy="412" r="3" class="dot"/>
  
  <text x="710" y="435" class="pin">SCL</text>
  <circle cx="705" cy="432" r="3" class="dot"/>
  
  <text x="710" y="455" class="pin">ADDR</text>
  <circle cx="705" cy="452" r="3" class="dot"/>
  
  <text x="835" y="375" class="pin" text-anchor="end">A0</text>
  <circle cx="845" cy="372" r="3" class="dot"/>
  
  <text x="835" y="395" class="pin" text-anchor="end">A1</text>
  <circle cx="845" cy="392" r="3" class="dot"/>
  
  <text x="835" y="415" class="pin" text-anchor="end">A2</text>
  <circle cx="845" cy="412" r="3" class="dot"/>
  
  <!-- Sensors Section (Right Side) -->
  
  <!-- pH Sensor -->
  <rect x="1050" y="150" width="120" height="80" class="sensor" rx="5"/>
  <text x="1110" y="175" text-anchor="middle" class="label">pH Sensor</text>
  <text x="1110" y="195" text-anchor="middle" class="label">Module</text>
  <text x="1060" y="215" class="pin">VCC</text>
  <circle cx="1055" cy="212" r="3" class="dot"/>
  <text x="1155" y="215" class="pin" text-anchor="end">OUT</text>
  <circle cx="1165" cy="212" r="3" class="dot"/>
  <text x="1060" y="225" class="pin">GND</text>
  <circle cx="1055" cy="222" r="3" class="dot"/>
  
  <!-- Turbidity Sensor -->
  <rect x="1050" y="270" width="120" height="80" class="sensor" rx="5"/>
  <text x="1110" y="295" text-anchor="middle" class="label">Turbidity</text>
  <text x="1110" y="315" text-anchor="middle" class="label">Module</text>
  <text x="1060" y="335" class="pin">VCC</text>
  <circle cx="1055" cy="332" r="3" class="dot"/>
  <text x="1155" y="335" class="pin" text-anchor="end">OUT</text>
  <circle cx="1165" cy="332" r="3" class="dot"/>
  <text x="1060" y="345" class="pin">GND</text>
  <circle cx="1055" cy="342" r="3" class="dot"/>
  
  <!-- TDS Sensor -->
  <rect x="1050" y="390" width="120" height="80" class="sensor" rx="5"/>
  <text x="1110" y="415" text-anchor="middle" class="label">TDS Sensor</text>
  <text x="1110" y="435" text-anchor="middle" class="label">Module</text>
  <text x="1060" y="455" class="pin">VCC</text>
  <circle cx="1055" cy="452" r="3" class="dot"/>
  <text x="1155" y="455" class="pin" text-anchor="end">OUT</text>
  <circle cx="1165" cy="452" r="3" class="dot"/>
  <text x="1060" y="465" class="pin">GND</text>
  <circle cx="1055" cy="462" r="3" class="dot"/>
  
  <!-- DS18B20 Temperature Sensor -->
  <rect x="1050" y="550" width="120" height="80" class="sensor" rx="5"/>
  <text x="1110" y="575" text-anchor="middle" class="label">DS18B20</text>
  <text x="1110" y="595" text-anchor="middle" class="label">Temp Probe</text>
  <text x="1060" y="615" class="pin">VDD</text>
  <circle cx="1055" cy="612" r="3" class="dot"/>
  <text x="1155" y="615" class="pin" text-anchor="end">DATA</text>
  <circle cx="1165" cy="612" r="3" class="dot"/>
  <text x="1060" y="625" class="pin">GND</text>
  <circle cx="1055" cy="622" r="3" class="dot"/>
  
  <!-- Voltage Dividers (between sensors and ADC) -->
  <!-- pH Divider -->
  <g id="divider1" transform="translate(920, 200)">
    <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#666" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="40" y="15" text-anchor="middle" class="pin">10kΩ</text>
    <line x1="40" y1="18" x2="40" y2="25" class="resistor"/>
    <path d="M 35,25 L 40,28 L 45,22 L 40,25 Z" class="resistor"/>
    <text x="40" y="40" text-anchor="middle" class="pin">20kΩ</text>
    <line x1="40" y1="28" x2="40" y2="35" class="resistor"/>
    <path d="M 35,35 L 40,38 L 45,32 L 40,35 Z" class="resistor"/>
  </g>
  
  <!-- Turbidity Divider -->
  <g id="divider2" transform="translate(920, 320)">
    <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#666" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="40" y="15" text-anchor="middle" class="pin">10kΩ</text>
    <line x1="40" y1="18" x2="40" y2="25" class="resistor"/>
    <path d="M 35,25 L 40,28 L 45,22 L 40,25 Z" class="resistor"/>
    <text x="40" y="40" text-anchor="middle" class="pin">20kΩ</text>
    <line x1="40" y1="28" x2="40" y2="35" class="resistor"/>
    <path d="M 35,35 L 40,38 L 45,32 L 40,35 Z" class="resistor"/>
  </g>
  
  <!-- TDS Divider -->
  <g id="divider3" transform="translate(920, 440)">
    <rect x="0" y="0" width="80" height="50" fill="#fff" stroke="#666" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="40" y="15" text-anchor="middle" class="pin">10kΩ</text>
    <line x1="40" y1="18" x2="40" y2="25" class="resistor"/>
    <path d="M 35,25 L 40,28 L 45,22 L 40,25 Z" class="resistor"/>
    <text x="40" y="40" text-anchor="middle" class="pin">20kΩ</text>
    <line x1="40" y1="28" x2="40" y2="35" class="resistor"/>
    <path d="M 35,35 L 40,38 L 45,32 L 40,35 Z" class="resistor"/>
  </g>
  
  <!-- Power Wires (Red) -->
  <!-- 5V to ESP32 -->
  <path d="M 170,90 L 250,90 L 250,307 L 355,307" class="wire-power"/>
  <text x="210" y="85" class="pin">5V</text>
  
  <!-- 5V to Sensors -->
  <path d="M 250,90 L 250,50 L 1000,50 L 1000,212 L 1055,212" class="wire-power"/>
  <path d="M 1000,212 L 1000,332 L 1055,332" class="wire-power"/>
  <path d="M 1000,332 L 1000,452 L 1055,452" class="wire-power"/>
  <path d="M 1000,452 L 1000,612 L 1055,612" class="wire-power"/>
  
  <!-- 3.3V from ESP32 to ADS1115 -->
  <path d="M 355,327 L 300,327 L 300,372 L 705,372" class="wire-power"/>
  <text x="500" y="370" class="pin">3.3V</text>
  
  <!-- Ground Wires (Black/Thick) -->
  <!-- Ground bus from power -->
  <path d="M 110,190 L 110,700" class="wire-ground"/>
  
  <!-- ESP32 to ground -->
  <path d="M 355,347 L 300,347 L 300,700 L 110,700" class="wire-ground"/>
  
  <!-- ADS1115 to ground -->
  <path d="M 705,392 L 650,392 L 650,700 L 110,700" class="wire-ground"/>
  
  <!-- ADS1115 ADDR to ground -->
  <path d="M 705,452 L 680,452 L 680,480 L 650,480 L 650,700" class="wire-ground"/>
  <text x="655" y="475" class="pin">0x48</text>
  
  <!-- Sensors to ground -->
  <path d="M 1055,222 L 1030,222 L 1030,700 L 110,700" class="wire-ground"/>
  <path d="M 1055,342 L 1030,342 L 1030,700" class="wire-ground"/>
  <path d="M 1055,462 L 1030,462 L 1030,700" class="wire-ground"/>
  <path d="M 1055,622 L 1030,622 L 1030,700" class="wire-ground"/>
  
  <!-- I2C Bus (Blue) -->
  <!-- SDA -->
  <path d="M 355,387 L 600,387 L 600,412 L 705,412" class="wire-i2c"/>
  <text x="530" y="383" class="pin">SDA</text>
  
  <!-- SCL -->
  <path d="M 355,407 L 620,407 L 620,432 L 705,432" class="wire-i2c"/>
  <text x="530" y="423" class="pin">SCL</text>
  
  <!-- Analog Signal Wires (Green) -->
  <!-- pH sensor through divider to A0 -->
  <path d="M 1165,212 L 1200,212 L 1200,225 L 960,225" class="wire-signal"/>
  <path d="M 960,225 L 870,225 L 870,372 L 845,372" class="wire-signal"/>
  <text x="880" y="370" class="pin">A0</text>
  
  <!-- Turbidity through divider to A1 -->
  <path d="M 1165,332 L 1200,332 L 1200,345 L 960,345" class="wire-signal"/>
  <path d="M 960,345 L 890,345 L 890,392 L 845,392" class="wire-signal"/>
  <text x="900" y="390" class="pin">A1</text>
  
  <!-- TDS through divider to A2 -->
  <path d="M 1165,452 L 1200,452 L 1200,465 L 960,465" class="wire-signal"/>
  <path d="M 960,465 L 910,465 L 910,412 L 845,412" class="wire-signal"/>
  <text x="920" y="410" class="pin">A2</text>
  
  <!-- OneWire (DS18B20 to GPIO4) -->
  <path d="M 1165,612 L 1240,612 L 1240,750 L 300,750 L 300,447 L 355,447" class="wire-signal"/>
  <text x="330" y="745" class="pin">OneWire Data</text>
  
  <!-- 4.7k Pullup Resistor for DS18B20 -->
  <rect x="240" y="730" width="50" height="25" fill="#fff" stroke="#666" stroke-width="1" rx="3"/>
  <text x="265" y="745" text-anchor="middle" class="pin">4.7kΩ</text>
  <path d="M 250,90 L 250,738 L 240,738" class="wire-power" stroke-dasharray="3,3"/>
  <text x="220" y="735" class="pin">Pull-up</text>
  
  <!-- Legend -->
  <g id="legend" transform="translate(50, 800)">
    <text x="0" y="0" class="title">Legend:</text>
    <line x1="0" y1="15" x2="40" y2="15" class="wire-power"/>
    <text x="45" y="20" class="pin">5V Power</text>
    
    <line x1="0" y1="35" x2="40" y2="35" class="wire-ground"/>
    <text x="45" y="40" class="pin">Ground</text>
    
    <line x1="0" y1="55" x2="40" y2="55" class="wire-i2c"/>
    <text x="45" y="60" class="pin">I2C Bus</text>
    
    <line x1="0" y1="75" x2="40" y2="75" class="wire-signal"/>
    <text x="45" y="80" class="pin">Analog/Data Signals</text>
  </g>
  
  <!-- Notes -->
  <g id="notes" transform="translate(50, 920)">
    <text x="0" y="0" class="label" font-weight="bold">Notes:</text>
    <text x="0" y="15" class="pin">• Voltage dividers scale 5V sensor outputs to 3.3V for ADS1115</text>
    <text x="0" y="30" class="pin">• ADS1115 address set to 0x48 (ADDR → GND)</text>
    <text x="0" y="45" class="pin">• DS18B20 requires 4.7kΩ pull-up resistor on data line</text>
    <text x="0" y="60" class="pin">• All sensors share common ground</text>
  </g>
  
</svg>